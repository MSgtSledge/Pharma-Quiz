        let currentQuestion = 0;
        let score = 0;
        let answered = [];
        let filteredQuestions = [...questions];
        let selectedCategory = null;

        const categories = [...new Set(questions.map(q => q.category))];

        function init() {
            displayCategories();
            displayQuestion();
            updateProgress();
        }

        function displayCategories() {
            const filter = document.getElementById('categoryFilter');
            filter.innerHTML = '<button class="category-btn active" data-category="all">Alle</button>';
            categories.forEach(cat => {
                filter.innerHTML += `<button class="category-btn" data-category="${cat}">${cat}</button>`;
            });

            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    filterByCategory(e.target.dataset.category);
                });
            });
        }

        function filterByCategory(category) {
            if (category === 'all') {
                filteredQuestions = [...questions];
            } else {
                filteredQuestions = questions.filter(q => q.category === category);
            }
            currentQuestion = 0;
            score = 0;
            answered = [];
            document.getElementById('results').classList.remove('show');
            document.getElementById('quizContainer').style.display = 'block';
            displayQuestion();
            updateProgress();
        }

        function displayQuestion() {
            const q = filteredQuestions[currentQuestion];
            document.getElementById('questionText').textContent = `${currentQuestion + 1}. ${q.question}`;
            
            const optionsHtml = q.options.map((option, index) => `
                <label class="option">
                    <input type="radio" name="answer" value="${index}">
                    <span>${String.fromCharCode(97 + index)}) ${option}</span>
                </label>
            `).join('');
            
            document.getElementById('optionsContainer').innerHTML = optionsHtml;
            document.getElementById('currentQuestion').textContent = currentQuestion + 1;
            document.getElementById('totalQuestions').textContent = filteredQuestions.length;
            document.getElementById('feedback').classList.remove('show');
            document.getElementById('submitBtn').textContent = 'Antwort prüfen';
            document.getElementById('submitBtn').disabled = false;

            document.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', () => {
                    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                });
            });
        }

        function checkAnswer() {
            const selected = document.querySelector('input[name="answer"]:checked');
            if (!selected) {
                alert('Bitte wählen Sie eine Antwort!');
                return;
            }

            const answer = parseInt(selected.value);
            const q = filteredQuestions[currentQuestion];
            const isCorrect = answer === q.correct;

            answered[currentQuestion] = { answer, isCorrect };

            if (isCorrect) {
                score++;
                document.getElementById('feedback').textContent = '✓ Richtig!';
                document.getElementById('feedback').className = 'feedback show correct';
                document.querySelectorAll('.option').forEach((opt, idx) => {
                    if (idx === q.correct) opt.classList.add('correct');
                });
            } else {
                document.getElementById('feedback').textContent = `✗ Falsch. Richtige Antwort: ${String.fromCharCode(97 + q.correct)}) ${q.options[q.correct]}`;
                document.getElementById('feedback').className = 'feedback show incorrect';
                document.querySelectorAll('.option').forEach((opt, idx) => {
                    if (idx === q.correct) opt.classList.add('correct');
                    if (idx === answer && answer !== q.correct) opt.classList.add('incorrect');
                });
            }

            document.getElementById('submitBtn').disabled = true;
            updateProgress();
        }

        function nextQuestion() {
            if (currentQuestion < filteredQuestions.length - 1) {
                currentQuestion++;
                displayQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                displayQuestion();
            }
        }

        function showResults() {
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('results').classList.add('show');
            document.getElementById('scoreValue').textContent = `${score}/${filteredQuestions.length}`;
        }

        function resetQuiz() {
            currentQuestion = 0;
            score = 0;
            answered = [];
            document.getElementById('results').classList.remove('show');
            document.getElementById('quizContainer').style.display = 'block';
            filterByCategory('all');
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / filteredQuestions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        document.getElementById('submitBtn').addEventListener('click', () => {
            if (document.querySelector('input[name="answer"]:checked')) {
                checkAnswer();
            } else {
                alert('Bitte wählen Sie eine Antwort!');
            }
        });

        document.getElementById('resetBtn').addEventListener('click', resetQuiz);
        document.getElementById('nextBtn').addEventListener('click', nextQuestion);
        document.getElementById('prevBtn').addEventListener('click', previousQuestion);

        init();
    </script>
