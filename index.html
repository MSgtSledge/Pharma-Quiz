        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function loadQuestion() {
            answered = false;
            const question = allQuestions[currentQuestionIndex];
            
            document.getElementById('questionNumber').textContent = `Frage ${currentQuestionIndex + 1}`;
            document.getElementById('questionText').textContent = question.text;
            document.getElementById('resultMessage').classList.remove('show', 'correct', 'incorrect');
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('submitBtn').disabled = false;
            
            // Mische die Antworten zufällig
            const optionsWithIndices = question.options.map((option, index) => ({
                text: option,
                originalIndex: String.fromCharCode(65 + index)
            }));
            
            // Fisher-Yates Shuffle
            for (let i = optionsWithIndices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [optionsWithIndices[i], optionsWithIndices[j]] = [optionsWithIndices[j], optionsWithIndices[i]];
            }
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            optionsWithIndices.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.innerHTML = `
                    <input type="radio" id="option${index}" name="answer" value="${option.originalIndex}">
                    <label for="option${index}">${option.text}</label>
                `;
                optionsContainer.appendChild(optionDiv);
            });
            
            updateProgress();
        }

        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / allQuestions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `Frage ${currentQuestionIndex + 1} von ${allQuestions.length}`;
        }

        function checkAnswer() {
            const question = allQuestions[currentQuestionIndex];
            const selectedOption = document.querySelector('input[name="answer"]:checked');
            
            if (!selectedOption) {
                alert('Bitte wähle eine Antwort!');
                return;
            }
            
            answered = true;
            const userAnswer = selectedOption.value;
            const isCorrect = userAnswer === question.answer;
            
            if (isCorrect) {
                score++;

            answers.push({
                question: currentQuestionIndex,
                selected: userAnswer,
                correct: question.answer,

            // Markiere die Optionen

            options.forEach((option, index) => {
                const radio = option.querySelector('input[type="radio"]');

                    option.classList.add('correct');
                }
                if (radio.value === userAnswer && !isCorrect) {
                    option.classList.add('incorrect');
                }
                radio.disabled = true;
            });
            
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            
            if (currentQuestionIndex < allQuestions.length) {
                loadQuestion();
            } else {
                showEndScreen();
            }
        }

        function showEndScreen() {
            document.getElementById('questionContainer').style.display = 'none';
            document.getElementById('endScreen').classList.add('show');
            
            const percentage = Math.round((score / allQuestions.length) * 100);
            document.getElementById('finalScore').textContent = `${percentage}%`;
            document.getElementById('correctCount').textContent = score;
            document.getElementById('incorrectCount').textContent = allQuestions.length - score;
            
            let scoreText = '';
            if (percentage >= 90) {
                scoreText = 'Ausgezeichnet! 🌟 Du bist bestens vorbereitet!';
            } else if (percentage >= 75) {
                scoreText = 'Sehr gut! 👍 Noch ein wenig wiederholen!';
            } else if (percentage >= 60) {
                scoreText = 'Gut! 💪 Noch etwas üben empfohlen!';
            } else {
                scoreText = 'Noch Luft nach oben! 📚 Weiter geht\'s!';
            }
            document.getElementById('scoreText').textContent = scoreText;
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            answered = false;
            answers = [];
            
            // Shuffel Fragen neu
            shuffleQuestions();
            
            document.getElementById('questionContainer').classList.add('active');
            document.getElementById('endScreen').classList.remove('show');
            
            loadQuestion();
        }

        function shuffleQuestions() {
            for (let i = allQuestions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allQuestions[i], allQuestions[j]] = [allQuestions[j], allQuestions[i]];
            }
        }

        // Starte Quiz — Fragen shuffeln
        shuffleQuestions();
        loadQuestion();
    </script>
</body>
</html>
