        }

        function checkAnswer() {
            const question = allQuestions[currentQuestionIndex];
            const selectedOption = document.querySelector('input[name="answer"]:checked');
            
            if (!selectedOption) {
                alert('Bitte wûÊhle eine Antwort!');
                return;
            }
            
            answered = true;
            const userAnswer = selectedOption.value;
            const isCorrect = userAnswer === question.answer;
            
            if (isCorrect) {
                score++;
            }
            
            answers.push({
                question: currentQuestionIndex,
                selected: userAnswer,
                correct: question.answer,
                isCorrect: isCorrect
            });
            
            const resultMessage = document.getElementById('resultMessage');
            resultMessage.classList.add('show');
            resultMessage.textContent = isCorrect ? 'ã Richtig!' : 'ã Falsch!';
            resultMessage.classList.add(isCorrect ? 'correct' : 'incorrect');
            
            const options = document.querySelectorAll('.option');
            options.forEach((option, index) => {
                const radio = option.querySelector('input[type="radio"]');
                if (radio.value === question.answer) {
                    option.classList.add('correct');
                }
                if (radio.value === userAnswer && !isCorrect) {
                    option.classList.add('incorrect');
                }
                radio.disabled = true;
            });
            
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            
            if (currentQuestionIndex < allQuestions.length) {
                loadQuestion();
            } else {
                showEndScreen();
            }
        }

        function showEndScreen() {
            document.getElementById('questionContainer').classList.remove('active');
            document.getElementById('endScreen').classList.add('show');
            
            const percentage = Math.round((score / allQuestions.length) * 100);
            document.getElementById('finalScore').textContent = `${percentage}%`;
            document.getElementById('correctCount').textContent = score;
            document.getElementById('incorrectCount').textContent = allQuestions.length - score;
            
            let scoreText = '';
            if (percentage >= 90) {
                scoreText = 'Ausgezeichnet! Þ Du bist bestens vorbereitet!';
            } else if (percentage >= 75) {
                scoreText = 'Sehr gut! Þ Noch ein wenig wiederholen!';
            } else if (percentage >= 60) {
                scoreText = 'Gut! Þˆ Noch etwas û¥ben empfohlen!';
            } else {
                scoreText = 'Noch Luft nach oben! Þ Weiter geht\'s!';
            }
            document.getElementById('scoreText').textContent = scoreText;
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            answered = false;
            answers = [];
            
            shuffleQuestions();
            
            document.getElementById('questionContainer').classList.add('active');
            document.getElementById('endScreen').classList.remove('show');
            
            loadQuestion();
        }

        // Starte Quiz ã Fragen shuffeln
        shuffleQuestions();
        loadQuestion();
    </script>
</body>
</html>
